name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  censor-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE"
            head="$PR_HEAD"
          else
            after="$PUSH_AFTER"
            if [ -z "$PUSH_BEFORE" ] || [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ]; then
              base=$(git rev-list --max-parents=0 "$after" | tail -n 1)
            else
              base="$PUSH_BEFORE"
            fi
            head="$after"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Verify Reviewed-By trailer on commits touching content/blog/
        env:
          BASE: ${{ steps.range.outputs.base }}
          HEAD: ${{ steps.range.outputs.head }}
        run: |
          set -eu
          echo "Checking commits in range: $BASE..$HEAD"
          regex='^Reviewed-By: 3-AI-Censor \(.*\) APPROVED [0-9]{4}-[0-9]{2}-[0-9]{2}$'
          fail=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            if git diff-tree --no-commit-id --name-only -r "$sha" | grep -qE '^content/blog/.+\.md$'; then
              if git log -1 --format=%B "$sha" | grep -Eq "$regex"; then
                echo "  ✓ $sha — trailer present"
              else
                echo "  ✗ $sha — MISSING Reviewed-By trailer"
                fail=1
              fi
            else
              echo "  - $sha — no article changes, exempt"
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "記事を変更したコミットに '3-AI-Censor' 検閲印がありません。"
            echo "ローカルで --no-verify を付けずにコミットし直してください。"
            exit 1
          fi

  build:
    needs: censor-guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # constitution.astro のビルド時に `git log -1` で最終 commit 時刻を参照するため深い履歴が必要
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          echo "Checking critical files..."
          fail=0
          test -f dist/sitemap-index.xml && echo "✓ sitemap-index.xml found" || { echo "✗ sitemap-index.xml missing"; fail=1; }
          test -f dist/robots.txt && echo "✓ robots.txt found" || { echo "✗ robots.txt missing"; fail=1; }
          test -f dist/rss.xml && echo "✓ rss.xml found" || { echo "✗ rss.xml missing"; fail=1; }

          if grep -q 'application/ld+json' dist/index.html; then
            echo "✓ JSON-LD structured data found in index.html"
          else
            echo "✗ JSON-LD structured data missing in index.html"
            fail=1
          fi

          echo ""
          echo "Checking tag pages..."
          test -f dist/tags/index.html && echo "✓ /tags/ index page" || { echo "✗ /tags/ index page missing"; fail=1; }
          tag_count=0
          for dir in dist/tags/*/; do
            if [ -f "${dir}index.html" ]; then
              tag_count=$((tag_count + 1))
            else
              echo "✗ ${dir}index.html missing"
              fail=1
            fi
          done
          echo "✓ ${tag_count} tag pages generated"

          echo ""
          echo "Checking constitution page..."
          test -f dist/constitution/index.html && echo "✓ /constitution/ page" || { echo "✗ /constitution/ page missing"; fail=1; }

          exit $fail

      - name: Link Checker (internal)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --verbose --root-dir ${{ github.workspace }}/dist --offline ./dist
          fail: true

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
